version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secure_pern_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pern-network

  api:
    build: ./backend
    container_name: secure_pern_api
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_PORT=${DB_PORT}
      - PORT=${PORT}
    depends_on:
      - db
    networks:
      - pern-network

  frontend:
    build: ./frontend
    container_name: secure_pern_frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api
    networks:
      - pern-network

networks:
  pern-network:
    driver: bridge

volumes:
  pgdata:
