version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pern_db
    environment:
      POSTGRES_USER: pern_user
      POSTGRES_PASSWORD: pern_password
      POSTGRES_DB: pern_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pern-network

  api:
    build: ./backend
    container_name: pern_api
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=pern_user
      - DB_PASSWORD=pern_password
      - DB_NAME=pern_database
      - DB_PORT=5432
      - PORT=5000
    depends_on:
      - db
    networks:
      - pern-network

  frontend:
    build: ./frontend
    container_name: pern_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api
    networks:
      - pern-network

networks:
  pern-network:
    driver: bridge

volumes:
  pgdata:
